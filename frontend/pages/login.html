<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
    <title>BarberOS - Iniciar Sesión</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">

    <div class="auth-card">
        <h2 class="auth-title">BarberOS</h2>
        <p class="auth-subtitle">Inicia sesión en tu barbería</p>
        <p id="appVersionLabel" class="auth-version">Version instalada: cargando...</p>
        
        <form id="formLogin">
            <input type="email" id="loginEmail" placeholder="Correo electrónico" autocomplete="email" class="auth-input auth-input-email">
            <input type="password" id="loginPassword" placeholder="Contraseña" autocomplete="current-password" class="auth-input auth-input-pass">

            <label class="auth-remember-label">
                <input type="checkbox" id="recordarSesion" class="auth-remember-check">
                Mantener sesión iniciada
            </label>
            
            <div id="mensajeError" class="auth-error"></div>
            
            <button id="btnEntrar" type="submit" class="auth-submit">Entrar</button>
        </form>
        
        <p class="auth-footnote">
            ¿No tienes cuenta? <a href="registro.html" class="auth-link">Regístrate aquí</a>
        </p>
    </div>

    <script src="../js/error-monitor.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
