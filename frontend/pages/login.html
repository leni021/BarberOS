<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BarberOS - Iniciar Sesión</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; background: #111827; height: 100vh; margin: 0;">

    <div style="background: white; padding: 40px; border-radius: 8px; width: 300px; text-align: center;">
        <h2 style="margin-top: 0; color: #111827;">BarberOS</h2>
        <p style="color: #475569; margin-bottom: 20px;">Inicia sesión en tu barbería</p>
        
        <input type="email" id="loginEmail" placeholder="Correo electrónico" style="width: 100%; box-sizing: border-box; margin-bottom: 10px;">
        <input type="password" id="loginPassword" placeholder="Contraseña" style="width: 100%; box-sizing: border-box; margin-bottom: 20px;">
        
        <div id="mensajeError" style="color: #ef4444; font-size: 14px; margin-bottom: 15px; display: none;"></div>
        
        <button id="btnEntrar" style="width: 100%; margin-top: 0;">Entrar</button>
        
        <p style="margin-top: 20px; font-size: 14px; color: #475569;">
            ¿No tienes cuenta? <a href="registro.html" style="color: #2563eb; text-decoration: none;">Regístrate aquí</a>
        </p>
    </div>

    <script src="../js/auth.js"></script>
</body>
</html>
