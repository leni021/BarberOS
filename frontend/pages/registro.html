<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
    <title>BarberOS - Registro</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">

    <div class="auth-card">
        <h2 class="auth-title">Crear Cuenta</h2>
        <p class="auth-subtitle">Registra tu barbería en BarberOS</p>
        <p id="appVersionLabel" class="auth-version">Version instalada: cargando...</p>

        <form id="formRegistro">
            <input type="text" id="regNegocio" placeholder="Nombre de la Barbería" class="auth-input auth-input-block" autocomplete="organization">
            <input type="text" id="regDueno" placeholder="Nombre del Dueño" class="auth-input auth-input-block" autocomplete="name">
            <input type="email" id="regEmail" placeholder="Correo electrónico" class="auth-input auth-input-block" autocomplete="email">
            <input type="password" id="regPassword" placeholder="Contraseña" class="auth-input auth-input-last" autocomplete="new-password">

            <button id="btnRegistrar" type="submit" class="auth-submit">Registrarse</button>
        </form>
        
        <p class="auth-footnote">
            ¿Ya tienes cuenta? <a href="login.html" class="auth-link">Inicia sesión aquí</a>
        </p>
    </div>

    <script src="../js/error-monitor.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
